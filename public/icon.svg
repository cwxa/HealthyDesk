<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Body -->
  <ellipse cx="50" cy="70" rx="25" ry="22" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  
  <!-- Neck -->
  <rect x="42" y="45" width="16" height="25" rx="6" fill="#81C784"/>
  
  <!-- Head -->
  <circle cx="50" cy="35" r="20" fill="url(#neckGrad)" filter="url(#shadow)"/>
  
  <!-- Eyes -->
  <circle cx="42" cy="32" r="3" fill="#fff"/>
  <circle cx="58" cy="32" r="3" fill="#fff"/>
  <circle cx="43" cy="32" r="1.5" fill="#1B5E20"/>
  <circle cx="59" cy="32" r="1.5" fill="#1B5E20"/>
  
  <!-- Smile -->
  <path d="M 42 42 Q 50 48 58 42" stroke="#1B5E20" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Shoulders -->
  <path d="M 25 58 Q 50 55 75 58" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Decorative elements -->
  <circle cx="20" cy="25" r="4" fill="#A5D6A7" opacity="0.6"/>
  <circle cx="80" cy="30" r="3" fill="#C8E6C9" opacity="0.8"/>
  <circle cx="15" cy="75" r="2" fill="#81C784" opacity="0.5"/>
  <circle cx="85" cy="70" r="3" fill="#A5D6A7" opacity="0.6"/>
</svg>