appId: com.neckguardian.app
productName: NeckGuardian
copyright: Copyright © 2024
directories:
  output: release
  buildResources: public
files:
  - dist/**/*
  - '!dist/neckguardian-backend/**'
  - electron/**/*.js
  - backend/**/*
  - package.json
extraResources:
  - from: backend/
    to: backend/
  - from: dist/neckguardian-backend/
    to: backend-dist/
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/icon.png
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: public/icon.png
  category: public.app-category.healthcare-fitness
linux:
  target:
    - target: tar.gz
      arch:
        - x64
  icon: public/icon.png
  category: Utility
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NeckGuardian
