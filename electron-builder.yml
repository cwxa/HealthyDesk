appId: com.neckguardian.app
productName: NeckGuardian
copyright: Copyright © 2024
directories:
  output: release
  buildResources: public
files:
  - dist/**/*
  - electron/**/*.js
  - backend/**/*
  - package.json
extraResources:
  - from: backend/
    to: backend/
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: NeckGuardian
